services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: repoinsight-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - repoinsight-network
    
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: repoinsight-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    command: npm run dev
    depends_on:
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - repoinsight-network

  worker:
    image: repoinsight-backend
    container_name: repoinsight-worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command: npm run worker
    depends_on:
      - redis
      - backend
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - repoinsight-network
  
  redis:
    image: redis:7-alpine
    container_name: repoinsight-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - repoinsight-network

volumes:
  redis-data:

networks:
  repoinsight-network:
    driver: bridge